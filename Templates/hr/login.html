<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HR Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#0f2027,#2c5364,#ff4b5c);
background-size:300% 300%;
animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-container{
position:relative;
width:380px;
padding:40px;
border-radius:20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
color:white;
animation: fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.back-btn{
position:absolute;
top:15px;
left:15px;
text-decoration:none;
background:transparent;
border:none;
color:white;
font-size:26px;   
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.back-btn:hover{
transform:scale(1.2);
color:#ff4b5c;
}

.login-title{
text-align:center;
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
}

.login-title span{
color:#ff4b5c;
}

.form-control{
background:rgba(255,255,255,0.15);
border:none;
color:white;
}

.form-control:focus{
background:rgba(255,255,255,0.25);
box-shadow:none;
color:white;
}

.form-control::placeholder{
color:#ddd;
}

.btn-login{
width:100%;
padding:10px;
border:none;
border-radius:30px;
background: linear-gradient(45deg,#ff416c,#1e90ff);
color:white;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

.btn-login:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{
color:#ff4b5c;
}

.footer-text{
text-align:center;
margin-top:20px;
font-size:14px;
color:#ddd;
}

</style>

</head>

<body>

<div class="login-container">

<a href="{% url 'landing_page' %}" class="back-btn">
←
</a>

<div class="logo">
HR<span>Portal</span>
</div>

<h4 class="login-title">HR <span>Login</span></h4>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<input type="text" name="username" class="form-control" placeholder="Username" required>
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="Password" required>
</div>

<button type="submit" class="btn-login">
Login
</button>

</form>

<div class="footer-text">
HR Management System
</div>

</div>

</body>
</html>
