{% extends 'hr/base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-center text-primary">Add New Employee</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} text-center text-danger fw-bold">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" class="mx-auto" style="max-width: 500px; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Employee</button>
    </form>
</div>

<!-- Optional animation -->
<style>
form {
    transform: translateY(-20px);
    opacity: 0;
    animation: fadeInUp 0.7s forwards;
}
@keyframes fadeInUp {
    to { transform: translateY(0); opacity: 1; }
}
</style>
{% endblock %}
