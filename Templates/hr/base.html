<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6fb;
        }

        /* HR Navbar */
        .hr-navbar {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }

        .hr-navbar .nav-link,
        .hr-navbar .navbar-brand {
            color: #fff !important;
            font-weight: 500;
        }

        .hr-badge {
            background: #ffc107;
            color: #000;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        /* Sidebar (optional later) */
        .dashboard-card {
            border-left: 5px solid #2a5298;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg hr-navbar shadow">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'hr:hr_dashboard' %}">
            <i class="bi bi-shield-lock-fill"></i> HR Dashboard
            <span class="hr-badge">HR</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'hr:leave_requests' %}">Leave Requests</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url "hr:employee_list" %}">Employees</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url "hr:add_employee" %}">Add Employee</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-warning" href="{% url 'hr:hr_logout' %}">
                        Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container my-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
