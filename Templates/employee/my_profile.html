{% extends 'employee/base.html' %}

{% block content %}

<!-- User Info Card -->
<div class="card shadow-sm rounded-4 mb-4">
  <div class="card-body d-flex align-items-center">

    <div class="me-4">
      <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
           style="width:70px; height:70px; font-size:28px;">
        {{ user.username|first|upper }}
      </div>
    </div>

    <div>
      <h4 class="mb-1">{{ user.get_full_name|default:user.username }}</h4>
      <p class="text-muted mb-0">{{ user.email }}</p>
    </div>

  </div>
</div>

<!-- Leave Summary Cards -->
<div class="row g-4">

  <!-- Total Leaves -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0 rounded-4 text-center">
      <div class="card-body">
        <h6 class="text-muted">Total Leaves</h6>
        <h2 class="fw-bold text-primary">{{ total_leaves }}</h2>
      </div>
    </div>
  </div>

  <!-- Used Leaves -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0 rounded-4 text-center">
      <div class="card-body">
        <h6 class="text-muted">Leaves Used</h6>
        <h2 class="fw-bold text-danger">{{ leaves_used|default:"0" }}</h2>
      </div>
    </div>
  </div>

  <!-- Remaining Leaves -->
  <div class="col-md-4">
    <div class="card shadow-sm border-0 rounded-4 text-center">
      <div class="card-body">
        <h6 class="text-muted">Remaining Leaves</h6>
        <h2 class="fw-bold text-success">{{ remaining_leaves }}</h2>
      </div>
    </div>
  </div>

</div>

{% endblock %}
