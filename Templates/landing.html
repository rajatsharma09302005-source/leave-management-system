<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#4e73df,#1cc88a,#36b9cc,#f6c23e);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
overflow:hidden;
}

/* Background animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* Glass container */

.container{
text-align:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:50px 60px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeIn 1s ease;
}

h1{
margin-bottom:30px;
color:white;
font-size:34px;
font-weight:700;
letter-spacing:1px;
}


/* Buttons */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:14px 28px;
margin:15px auto;
border:none;
border-radius:8px;
font-size:18px;
font-weight:600;
cursor:pointer;
width:230px;
transition:0.3s;
}


/* Employee Button */

.employee{
background:linear-gradient(45deg,#4e73df,#224abe);
color:white;
}

.employee:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}


/* HR Button */

.hr{
background:linear-gradient(45deg,#e74a3b,#c0392b);
color:white;
}

.hr:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}


/* Floating circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);
animation:float 15s infinite linear;
}

.circle:nth-child(1){
width:60px;
height:60px;
top:10%;
left:20%;
animation-duration:20s;
}

.circle:nth-child(2){
width:40px;
height:40px;
top:70%;
left:80%;
animation-duration:18s;
}

.circle:nth-child(3){
width:80px;
height:80px;
top:80%;
left:10%;
animation-duration:22s;
}

.circle:nth-child(4){
width:50px;
height:50px;
top:20%;
left:90%;
animation-duration:16s;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
}
100%{
transform:translateY(-1200px) rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1>Leave Management System</h1>

<a href="/employee/login/">
<button class="btn employee">
<i class="bi bi-person-fill"></i>
Employee Login
</button>
</a>

<a href="/hr/login/">
<button class="btn hr">
<i class="bi bi-shield-lock-fill"></i>
HR Login
</button>
</a>

</div>

</body>
</html>
